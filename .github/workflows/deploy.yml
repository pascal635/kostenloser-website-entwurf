name: Deploy Entwürfe (FTP)

# Laedt sites/ per FTPS (lftp) auf den dev-Webspace (dedi1145, gleicher Zugang wie beta-plus).
# sites/<kunde>/ landet unter /<kunde>/ = dev.likovo.de/<kunde>/
# KEIN --delete: nur hochladen/aktualisieren, damit andere Kundenordner im Docroot unangetastet bleiben.

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-main
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: FTPS Deploy (lftp)
        env:
          FTP_HOST: ${{ secrets.FTP_HOST }}
          FTP_USER: ${{ secrets.FTP_USER }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq lftp
          lftp -c "
            set ftp:ssl-force true;
            set ftp:ssl-protect-data true;
            set ssl:verify-certificate no;
            set net:max-retries 2;
            set net:timeout 20;
            open -u \"$FTP_USER\",\"$FTP_PASSWORD\" \"$FTP_HOST\";
            mirror -R --verbose --exclude-glob .git* ./sites/ ./;
          "
