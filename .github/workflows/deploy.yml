name: Deploy Entwürfe (FTP)

# Deployt sites/ per FTPS (lftp) auf dev.likovo.de.
# sites/<kunde>/ landet unter <FTP_SERVER_DIR>/<kunde>/ = dev.likovo.de/<kunde>/
# Kein --delete: es wird nur hochgeladen/aktualisiert, nie serverseitig gelöscht
# (schützt andere Kundenordner, die evtl. schon dort liegen).

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: lftp installieren
        run: sudo apt-get update -qq && sudo apt-get install -y lftp

      - name: FTPS Deploy (lftp)
        env:
          FTP_HOST: ${{ secrets.FTP_HOST }}
          FTP_USER: ${{ secrets.FTP_USER }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
          FTP_SERVER_DIR: ${{ secrets.FTP_SERVER_DIR }}
        run: |
          umask 077
          {
            echo 'set ftp:ssl-force true'
            echo 'set ftp:ssl-protect-data true'
            echo 'set ssl:verify-certificate no'
            echo 'set net:timeout 15'
            echo 'set net:max-retries 3'
            printf 'open ftp://%s\n' "$FTP_HOST"
            printf 'user "%s" "%s"\n' "$FTP_USER" "$FTP_PASSWORD"
            printf 'mirror -R --verbose ./sites/ %s\n' "$FTP_SERVER_DIR"
            echo 'bye'
          } > deploy.lftp
          lftp -f deploy.lftp
          rm -f deploy.lftp
