name: Deploy Entwürfe (FTP)

# Deployt bei jedem Push den Inhalt von sites/ per FTP auf dev.likovo.de.
# sites/<kunde>/ landet unter <FTP_SERVER_DIR>/<kunde>/ = dev.likovo.de/<kunde>/
# Nur geänderte Dateien werden übertragen (inkrementell).

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: FTP Deploy
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USER }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ${{ secrets.FTP_PROTOCOL || 'ftps' }}
          local-dir: ./sites/
          server-dir: ${{ secrets.FTP_SERVER_DIR }}
